prerequisite-job:
  stage: .pre
  script: 
    - python --version
    - where python
  environment: dev

confirm-job:
  stage: .pre
  script: 
    - node --version
    - where node
  environment: dev

build-job:
  stage: build
  script:
    - echo "Hello, $GITLAB_USER_LOGIN!"
  environment: dev

test-job1:
  stage: test
  script:
    - echo "This job tests something"
  environment: testing

test-job2:
  stage: test
  script:
    - echo "This job tests something, but takes more time than test-job1."
    - echo "After the echo commands complete, it runs the sleep command for 20 seconds"
    - echo "which simulates a test that runs 20 seconds longer than test-job1"
    - sleep 20
  environment: testing

pre-deploy:
  stage: deploy
  script: 
    - echo "Prepare for launch"
    - ping www.google.com -t

deploy-prod:
  stage: deploy
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
    - echo "Toggle off instance runners to bypass account verification."
  environment: production

cleanup:
  stage: .post
  script:
    - echo "Cleaning up..."
    - sleep 10
    - echo "Done."
